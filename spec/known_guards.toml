# Known guards registry — Research Governance v0.1
#
# A "known guard" is a structural condition that is already understood to
# carry no new mathematical content for the route at hand. The FixedParams
# Probe (see FixedParams_Probe.md) classifies a non-trivial provenance Π
# as Outcome B ("non-dead but uninteresting") only by reducing Π to a
# combination of guards that appear in this registry.
#
# The registry is intentionally empty on day 0. Adding an entry is a
# Foundational PR (Rule 0): it admits that a particular structural pattern
# is *known* and routes through it are *known to lack new content*.
#
# Format per entry:
#
# [guards.<short_name>]
# formal_name = "<fully qualified Lean name or '∅' if not yet formalized>"
# file        = "<path:line of the formal artifact, or '∅'>"
# status      = "accepted" | "informal"
# audit       = "<one-paragraph audit explanation>"
# added_in    = "<spec version>"
# rationale   = "<why it is no longer counted as new content>"
#
# Outcome B in FixedParams_Probe.md may reference only guards whose
# `status = "accepted"`.

[meta]
spec_version    = "0.1.1"
status          = "frozen"
last_reviewed   = "2026-05-01"

# ---------------------------------------------------------------------------
# Accepted guards (FP-1).
# ---------------------------------------------------------------------------
#
# An "accepted" guard MUST point to a real Lean artifact that is
# compiled by `lake build`.  Outcome B in `FixedParams_Probe.md` may
# only reference accepted guards.

[guards.HardwiringGuard]
formal_name      = "Pnp3.Tests.FormulaSupportBoundsFalsifiabilityProbe.fixedSlice_gapPartialMCSP_in_PpolyFormula"
file             = "pnp3/Tests/FormulaSupportBoundsFalsifiabilityProbe.lean:218"
audit_alias      = "Pnp3.Magnification.AuditRoutes.FixedParamsProbe.HardwiringGuard"
audit_alias_file = "pnp3/Magnification/AuditRoutes/FixedParamsProbe.lean"
status           = "accepted"
added_in         = "0.1.1"
# Tautology caveat (added during the v0.1 Machine Revalidation Review):
# `HardwiringGuard` is a Lean theorem inhabited unconditionally via
# `Pnp3.Magnification.AuditRoutes.FixedParamsProbe.hardwiring_guard_holds`.
# Therefore it is NOT admissible as a standalone Outcome-B factorization
# target: any `Π → HardwiringGuard` is vacuous because anything implies
# a tautology.  Outcome B (per `FixedParams_Probe.md` §3.B) may reference
# `HardwiringGuard` only as part of an obstruction-style argument
# (Rule-5 exclusion lemma: candidate Π must formally exclude the
# truth-table hardwired witness).
outcome_b_usage                   = "obstruction_only"
standalone_factorization_target   = false
audit            = """The truth-table hardwiring construction (Probe 2 of the falsifiability audit at FormulaSupportBoundsFalsifiabilityProbe.lean:218) inhabits Pnp3.ComplexityInterfaces.PpolyFormula for every Partial-MCSP slice, so per-language singleton families are always available.  Any candidate provenance Π that quantifies over arbitrary PpolyFormula witnesses without a Rule-5 exclusion lemma is therefore vacuously true on this hardwired witness."""
rationale        = """Recognized in the FixedParams Probe as the obstruction that any 'route is dead' Outcome A reduction must point to: a candidate must formally EXCLUDE this witness shape (Rule 5 exclusion lemma `¬ ∃ W, TruthTableHardwired W ∧ Π_holds_for W`).  HardwiringGuard is NOT a standalone Outcome-B factorization target — see `outcome_b_usage` and `standalone_factorization_target` above; a real Outcome B requires a different guard (e.g. a future `ProvenanceFilter_v1` that is genuinely conditional, not a Lean theorem)."""

