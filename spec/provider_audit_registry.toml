# ---------------------------------------------------------------------------
# Forbidden-typeclass-parameter list (consumed by the guard).
# ---------------------------------------------------------------------------
# All entries with `audit_class = "refuted-channel"` are forbidden as
# typeclass parameters (the bracketed `[X]` form) outside the
# audit/test/docs allowlist. The guard currently hard-codes:
#
#   - VacuousFinalPayloadProvider             (PR 2 baseline)
#   - FinalPayloadProvider                    (PR 2 historical name)
#   - Fact hasDefaultFormulaSupportRestrictionBoundsPartial
#                                              (PR 2 baseline)
#
# PR 6 adds:
#
#   - FormulaSemanticMultiSwitchingProvider
#
# When new refuted-channel entries are added, both this registry AND
# the guard's `typeclass_patterns` array must be updated together.
[guard_extensions]
refuted_channel_typeclasses = [
  "VacuousFinalPayloadProvider",                  # PR 2
  "FinalPayloadProvider",                         # PR 2 historical
  "FormulaSemanticMultiSwitchingProvider",        # PR 6
]
refuted_channel_facts = [
  "hasDefaultFormulaSupportRestrictionBoundsPartial",  # PR 2
]
