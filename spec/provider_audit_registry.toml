# Provider audit registry — Research Governance v0.1, PR 6.
#
# Classifies every provider/typeclass/structure in `pnp3/` whose name
# contains one of `Provider`, `Payload`, `Witness`, `Certificate`,
# `Source`, `Default`, `Gap`.  Each row carries an `audit_class`
# (used by `scripts/check_typeclass_payload_quarantine.sh` to extend
# the forbidden-typeclass-parameter list) and a one-line note.
#
# `audit_class` taxonomy (RESEARCH_CONSTITUTION.md Rule 16):
#
#   refuted-channel        : embeds a refuted predicate (per
#                            spec/target.toml::[refuted_predicates])
#                            either as a field or as a transitive
#                            dependency. New uses of these typeclasses
#                            as theorem parameters outside audit/
#                            test/docs are forbidden.
#
#   optional-combinatorial : carries non-refuted but optional
#                            combinatorial source data. Allowed
#                            outside the trust root, but flagged for
#                            human review when used in a candidate.
#
#   suspicious-provider    : provider/payload shape that has not been
#                            audited yet. Treated as "unknown until
#                            audited"; the typeclass-payload guard
#                            flags new uses but does not yet hard-
#                            fail outside audit zones.
#
#   infrastructure         : non-payload typeclass/structure used for
#                            ordinary infrastructure (Decidable-style,
#                            data containers, etc.). Allowed
#                            everywhere.
#
# This file is the source-of-truth consumed by:
#   - scripts/check_typeclass_payload_quarantine.sh (Step 5/12)
#     extends its hard-rejection list with every `refuted-channel`
#     entry's `name`.
#   - Future PRs (PR 11 TargetLock, PR 12 barrier-certificate) may
#     consult this file when validating candidate-local typeclass use.

[meta]
spec_version  = "0.1.0"
status        = "frozen"
last_reviewed = "2026-04-30"
schema_note   = "Add a new row whenever a new provider/typeclass/structure with a Provider/Payload/Witness/Certificate/Source/Default/Gap name is introduced. Bump [meta].spec_version on any taxonomy change."

