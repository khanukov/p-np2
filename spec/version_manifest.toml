# ---------------------------------------------------------------------------
# Bump rules.
# ---------------------------------------------------------------------------
#
# The model is intentionally per-file, NOT a single global version.
# A single global version would pretend that a doc-only edit to one
# spec invalidates all others; that is dishonest and forces
# spurious churn on downstream artifacts.
#
# Concretely:
#
#  * Edit `spec/target.toml`           ->  bump target_spec_version.
#  * Edit `spec/known_guards.toml`     ->  bump known_guards_version.
#  * Add/remove/change provider class  ->  bump provider_audit_registry_version.
#  * Add/remove/change a smoke probe   ->  bump attack_suite_version.
#  * Ship a new MVP slice              ->  bump autoresearch_mvp_version.
#  * Change Critic protocol schema     ->  bump critic_protocol_version.
#
# In all cases: bump THIS file's matching `[snapshot.*].version`
# AND the underlying file's `[meta].spec_version` (when applicable),
# and run `scripts/validate_version_manifest.py` to confirm
# consistency.
#
# `outputs/attempts.jsonl::AttemptLedgerEntry` records
# `applicable_spec_version` (= target_spec_version at attempt time)
# and `attack_suite_version` (= attack_suite_version at attempt
# time).  Both names match this manifest's snapshot fields.

# ---------------------------------------------------------------------------
# What this manifest does NOT do.
# ---------------------------------------------------------------------------
#
# It does NOT version Lean source files.  Lean module versions are
# tracked via git history (commit hash) and via the
# `attempt.applicable_spec_version` field, NOT here.
#
# It does NOT version the Research Constitution itself.  The
# Constitution is a frozen document; substantive amendments require
# a Foundational PR (Rule 0) and would update the file's narrative
# header, not this manifest.
