# Version manifest — Research Governance v0.1, Autoresearch MVP-0.1.4
#
# Single coordinated source-of-truth for the cross-spec versioning
# model.  Each spec file under `spec/` carries its own
# `[meta].spec_version` tracking edits to that file in isolation;
# this manifest names each version explicitly and records the
# coordinated snapshot that has been jointly reviewed and shipped.
#
# Five-engineer audit observation (consolidated triage): four
# independent auditors saw `target.toml::[meta].spec_version =
# "0.1.0"` next to `known_guards.toml::[meta].spec_version =
# "0.1.2"` and asked which is canonical.  Both are canonical for
# their own files; the apparent mismatch is real but per-file.
# This manifest documents the intended model and gives each version
# a self-describing name (target_spec_version,
# known_guards_version, ...) so the relationship is unambiguous.
#
# `scripts/validate_version_manifest.py` cross-checks this manifest
# against the actual `[meta].spec_version` fields of the underlying
# files.  Drift fails the check.

[meta]
manifest_version = "0.1.0"
status           = "frozen"
last_reviewed    = "2026-05-02"

# ---------------------------------------------------------------------------
# Coordinated snapshot — current per-spec versions.
# ---------------------------------------------------------------------------
#
# Each entry below MUST equal the corresponding file's
# `[meta].spec_version`.  When a spec file's contents change, bump
# its own [meta].spec_version AND update the corresponding row here
# in the same PR.  The validator at
# scripts/validate_version_manifest.py enforces equality.

[snapshot]
target_spec_version              = "0.1.2"
target_spec_path                 = "spec/target.toml"
known_guards_version             = "0.1.4"
known_guards_path                = "spec/known_guards.toml"
provider_audit_registry_version  = "0.1.0"
provider_audit_registry_path     = "spec/provider_audit_registry.toml"

# ---------------------------------------------------------------------------
# Non-`[meta].spec_version` versions (no in-file [meta] block).
# ---------------------------------------------------------------------------

